<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=web/index.html">
    <title>SKIL Lifestyle - Multi-Target Portal</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            --bg-canvas: #f4f5f8;
            --accent-lime: #e2fc52;
            --accent-pink: #ff65a3;
            --accent-cyan: #00f0ff;
            --border-thick: 3px solid #000000;
            --shadow-brutal: 5px 5px 0px #000000;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body {
            background-color: var(--bg-canvas);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .portal-card {
            background: #ffffff;
            border: var(--border-thick);
            box-shadow: var(--shadow-brutal);
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        .portal-logo {
            height: 64px;
            margin-bottom: 20px;
        }
        h1 { font-size: 1.6rem; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; }
        p { color: #5a6072; font-weight: 600; margin-bottom: 24px; font-size: 0.95rem; }
        .btn-launch {
            display: block;
            background: var(--accent-lime);
            color: #000;
            text-decoration: none;
            border: var(--border-thick);
            box-shadow: 4px 4px 0px #000;
            padding: 14px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 1rem;
            text-transform: uppercase;
            margin-bottom: 12px;
            transition: transform 0.1s ease;
        }
        .btn-launch:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }
        .links-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
        .chip-link {
            background: #ffffff;
            color: #000;
            text-decoration: none;
            border: 2px solid #000;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            box-shadow: 2px 2px 0px #000;
        }
    </style>
</head>
<body>
    <div class="portal-card">
        <img src="https://res.cloudinary.com/aiz2tooi/image/upload/f_auto,q_auto/v1784722804/SKIL_Lifestyle_Black_Transparent_BG_Logo.png" alt="SKIL Lifestyle Logo" class="portal-logo">
        <h1>SKIL LIFESTYLE PORTAL</h1>
        <p>Redirecting to E-Commerce Web Application...</p>

        <a href="web/index.html" class="btn-launch">🛍️ Open E-Commerce Store</a>

        <div class="links-row">
            <a href="ai/journal.html" class="chip-link">📊 Activity Journal</a>
            <a href="ai/preview.html" class="chip-link">💻 Live Preview Engine</a>
            <a href="ai/privacy-policy.html" class="chip-link">🔒 Privacy Policy</a>
        </div>
    </div>
</body>
</html>
