<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKIL Lifestyle - Dual Navbar E-Commerce</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Toast Notification Overlay (Rule 05 Compliant) -->
    <div id="toastContainer"></div>

    <!-- Announcement Bar -->
    <div class="top-bar">
        ⚡ SUMMER DROP '26 IS LIVE &bull; FREE SHIPPING ON ORDERS OVER $100 &bull; USE CODE "SKIL26"
    </div>

    <!-- Dual Navbar 1: Top Brand & Partner Logo Bar -->
    <header class="logo-navbar">
        <a href="#" class="nav-brand">
            <img src="assets/logo/SKIL_Lifestyle_Black_Transparent_BG_Logo.png" alt="SKIL Lifestyle Logo" class="brand-logo-main">
        </a>

        <!-- Top Right Partner Logos Container -->
        <div class="partner-logos-container">
            <img src="assets/logo/Ajanta_Transparent_Logo.png" alt="Ajanta Logo" class="partner-logo-item" title="Ajanta Official Partner">
            <div class="partner-divider"></div>
            <img src="assets/logo/Xpania_Transparent_Logo.png" alt="Xpania Logo" class="partner-logo-item" title="Xpania Official Partner">
        </div>
    </header>

    <!-- Dual Navbar 2: Navigation Controls & Cart (Sticky) -->
    <nav class="controls-navbar">
        <div class="controls-left">
            <input type="text" class="search-input" placeholder="Search products, kicks, tech..." onkeyup="handleSearch(this.value)">
            
            <div class="nav-cat-row">
                <button class="nav-cat-pill active" onclick="setCategory('all', this)">🔥 All Drops</button>
                <button class="nav-cat-pill" onclick="setCategory('apparel', this)">🧥 Apparel</button>
                <button class="nav-cat-pill" onclick="setCategory('footwear', this)">👟 Footwear</button>
                <button class="nav-cat-pill" onclick="setCategory('tech', this)">⌨️ Tech</button>
                <button class="nav-cat-pill" onclick="setCategory('accessories', this)">🎒 Accessories</button>
            </div>
        </div>

        <button class="btn-cart" onclick="toggleCartDrawer()">
            <span>🛒 Cart</span>
            <span class="cart-badge" id="cartBadge">0</span>
        </button>
    </nav>

    <!-- Hero Showcase Section -->
    <div class="hero-container">
        <div class="hero-banner">
            <div class="hero-text">
                <span class="hero-tag">🔥 EXCLUSIVE DROP</span>
                <h1>SUPER FLUID STREETWEAR & TECH GEAR</h1>
                <p>Engineered for maximum 120Hz performance, bold aesthetics, and high-impact everyday style.</p>
                <button class="btn-hero" onclick="showToast('Browsing Summer 2026 Collection!', 'lime')">Shop Collection</button>
            </div>
        </div>
    </div>

    <!-- Main Products Grid -->
    <div class="products-section">
        <div class="section-title">
            <span>📦 Featured Products</span>
        </div>
        <div class="products-grid" id="productsContainer">
            <!-- Dynamically Rendered by app.js -->
        </div>
    </div>

    <!-- Cart Slide-Over Drawer -->
    <div class="cart-overlay" id="cartOverlay" onclick="toggleCartDrawer()"></div>
    <div class="cart-drawer" id="cartDrawer">
        <div class="drawer-header">
            <div class="drawer-title">YOUR SHOPPING CART</div>
            <button class="btn-close-drawer" onclick="toggleCartDrawer()">×</button>
        </div>

        <div class="drawer-body" id="drawerBody">
            <!-- Dynamically Rendered Cart Items -->
        </div>

        <div class="drawer-footer">
            <div class="cart-total-row">
                <span>SUBTOTAL:</span>
                <span id="cartTotalVal">$0</span>
            </div>
            <button class="btn-checkout" onclick="checkout()">Proceed To Checkout →</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
