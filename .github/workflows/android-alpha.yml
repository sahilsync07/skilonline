name: Build and Release Android App (Alpha)

on:
  workflow_dispatch: # Manual trigger only (automatic git push trigger disabled until ready for deployment)

concurrency:
  group: google-play-deploy-skil
  cancel-in-progress: false

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Decode Keystore
        run: |
          mkdir -p composeApp/build/outputs
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\r\n' | sed 's/-----BEGIN CERTIFICATE-----//g' | sed 's/-----END CERTIFICATE-----//g' | base64 --decode > composeApp/release-key.keystore

      - name: Calculate Version Code
        id: version_code
        run: echo "code=$(( ${{ github.run_number }} + 110000 ))" >> $GITHUB_OUTPUT

      - name: Build Release App Bundle (.aab)
        run: |
          chmod +x ./gradlew
          ./gradlew :composeApp:bundleRelease

      - name: Upload to Google Play Store (Alpha Track)
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.skil.app
          releaseFiles: composeApp/build/outputs/bundle/release/composeApp-release.aab
          track: alpha
          status: completed
