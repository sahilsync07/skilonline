name: Build and Release Android App (All Tracks)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# CRITICAL: Single concurrency group ensures only ONE Play Console
# edit session exists at a time, permanently preventing "Edit expired" errors.
concurrency:
  group: google-play-deploy-skil-unified
  cancel-in-progress: false

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.9"
          cache-disabled: true

      - name: Calculate Dynamic Auto-Increment Version Code
        run: |
          AUTO_VERSION_CODE=$(( 100000 + ${{ github.run_number }} ))
          AUTO_VERSION_NAME="1.0.${{ github.run_number }}"
          echo "VERSION_CODE=$AUTO_VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$AUTO_VERSION_NAME" >> $GITHUB_ENV
          echo "Generated Auto-Increment Version Code: $AUTO_VERSION_CODE ($AUTO_VERSION_NAME)"

      - name: Decode Release Keystore
        run: |
          mkdir -p android/composeApp
          echo '' | base64 -d > android/composeApp/skil-release-key.jks
          echo "Keystore decoded successfully ($(wc -c < android/composeApp/skil-release-key.jks) bytes)"

      - name: Build Release App Bundle (.aab)
        working-directory: android
        run: |
          set -o pipefail
          gradle :composeApp:bundleRelease -PversionCode=${{ env.VERSION_CODE }} -PversionName="${{ env.VERSION_NAME }}" --stacktrace 2>&1 | tee /tmp/build.log
          echo "BUILD SUCCEEDED WITH VERSION CODE ${{ env.VERSION_CODE }}"

      - name: Show build log on failure
        if: failure()
        run: |
          echo "=== LAST 300 LINES OF BUILD LOG ==="
          tail -300 /tmp/build.log || echo "No build log found"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: skil-lifestyle-release-aab
          path: android/composeApp/build/outputs/bundle/release/*.aab

      - name: Verify AAB exists
        run: |
          AAB_PATH=$(ls android/composeApp/build/outputs/bundle/release/*.aab || true)
          if [ -z "$AAB_PATH" ]; then
            echo "No AAB found!"
            exit 1
          fi
          echo "Found AAB: $AAB_PATH"

      # ---------------------------------------------------------------
      # SEQUENTIAL UPLOADS: Internal first, then Alpha.
      # Google Play API allows only ONE active Edit per app.
      # Running these in sequence within the SAME job guarantees
      # no edit contention. This is the PERMANENT fix.
      # ---------------------------------------------------------------

      - name: Upload to Play Store - Internal Track
        if: success()
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.skil.app
          releaseFiles: android/composeApp/build/outputs/bundle/release/*.aab
          track: internal
          status: completed

      - name: Upload to Play Store - Alpha Track (Closed Testing)
        if: success()
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.skil.app
          releaseFiles: android/composeApp/build/outputs/bundle/release/*.aab
          track: alpha
          status: completed
